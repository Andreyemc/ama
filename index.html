<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ama — hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,400;6..144,500&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#7A3104; --text:#FAF4E8; --pill:#F7EEE0; --pill-text:#A8500F; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    background:var(--bg);                 /* фон заливает весь вьюпорт */
    overflow:hidden;
    font-family:'Google Sans Flex','Poppins',system-ui,sans-serif;
  }
  /* тёплое круговое свечение, во весь экран */
  .glow{
    position:fixed; left:50%; top:32%;
    width:1650px; height:1650px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:rgba(255,161,102,0.40);
    filter:blur(500px);
    pointer-events:none; z-index:0;
  }
  /* частицы-лого: канвас во весь экран, лого выходит за края */
  #c{
    position:fixed; inset:0; width:100%; height:100%;
    display:block;
    mix-blend-mode:overlay; opacity:0.40;
    pointer-events:none; z-index:1;
  }
  /* контент: фиксированный артборд 1440x900, масштаб contain, по центру */
  .stage{
    position:fixed; left:50%; top:50%;
    width:1440px; height:900px;
    transform:translate(-50%,-50%) scale(1);
    transform-origin:center center;
    z-index:2; pointer-events:none;
  }
  .overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
  }
  .hero-title{ margin:0; font-weight:500; font-size:74px; line-height:1.02; letter-spacing:-0.01em; color:var(--text); }
  .hero-sub{
    align-self:center;
    margin:24px auto 0;
    font-family:'Google Sans Flex','Poppins',system-ui,sans-serif;
    font-size:20px; font-weight:400; line-height:140%;
    text-align:center; color:#F7EEE0; opacity:0.6;
    max-width:none;
  }
  .hero-actions{ margin-top:48px; }
  .btn{
    font-family:'IBM Plex Mono',ui-monospace,monospace;
    font-size:12px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--pill-text); background:var(--pill);
    border:none; border-radius:999px; padding:16px 38px; cursor:pointer; line-height:1;
    pointer-events:auto; transition:transform .15s ease, opacity .2s ease;
  }
  .btn:hover{ opacity:.92; } .btn:active{ transform:translateY(1px); }
</style>
</head>
<body>
  <div class="glow"></div>
  <canvas id="c"></canvas>
  <div class="stage" id="stage">
    <div class="overlay">
      <h1 class="hero-title">Start your wellbeing<br>journey today</h1>
      <p class="hero-sub">Join thousands building healthier habits with trusted professionals across<br>nutrition, activity, mindfulness and sleep.</p>
      <div class="hero-actions"><button class="btn">Discover</button></div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const COLOR = "#FFFFFF";                  // белые частицы (overlay поверх тёмного фона)
  const NAT_W = 1360, NAT_H = 520;          // «родной» размер лого для сэмплинга
  const ASPECT = NAT_H / NAT_W;             // соотношение сторон лого

  const canvas = document.getElementById("c");
  const stage  = document.getElementById("stage");
  const ctx    = canvas.getContext("2d", { alpha: true });

  // SVG логотипа "Ama" (3 path) — маска формы
  const SVG = `<svg xmlns="http://www.w3.org/2000/svg" width="681" height="257" viewBox="0 0 681 257">
<path fill="${COLOR}" d="M680.401 70.9633C680.401 76.6563 678.882 81.5902 676.605 87.6628C661.425 129.411 630.304 209.113 626.129 224.294C626.509 225.054 627.647 225.813 628.406 225.813C635.617 225.813 652.696 209.113 669.774 189.377L675.846 197.348C656.111 226.192 625.37 256.555 610.569 256.555C601.081 256.555 591.973 251.241 591.973 240.994C591.973 237.958 594.629 230.367 598.424 220.12L611.328 187.1L609.43 186.341C585.141 220.499 546.43 256.555 529.352 256.555C511.894 254.278 502.786 238.717 502.786 218.981C502.786 159.774 563.509 67.5475 621.955 67.5475C631.063 67.5475 642.449 70.2043 650.039 74.7586C652.316 68.3066 654.214 62.9931 655.732 58.0592C658.388 57.6797 659.527 57.6797 661.425 57.6797C672.81 57.6797 680.401 63.3727 680.401 70.9633ZM545.292 225.433C560.093 225.433 598.045 195.45 626.129 139.279L641.31 99.8078C631.443 92.2171 618.918 86.5242 601.081 86.5242C568.442 86.5242 535.804 166.606 535.804 204.559C535.804 216.704 540.358 225.433 545.292 225.433Z"/>
<path fill="${COLOR}" d="M509.02 189.405L515.092 197.375C495.357 224.322 468.412 255.823 445.261 255.823C433.496 255.823 430.839 248.991 430.839 242.16C430.839 231.153 478.659 110.082 479.797 101.733C478.279 95.2807 474.863 91.1059 469.171 91.1059C457.026 91.1059 420.213 124.125 374.67 220.147L361.767 252.787C359.49 253.166 358.351 253.166 357.972 253.166C344.688 253.166 339.375 248.232 339.375 239.503C339.375 234.949 340.893 230.015 344.688 219.767C354.176 193.58 388.713 106.667 388.713 101.733C386.815 94.5216 383.399 91.1059 378.086 91.1059C361.767 91.4854 321.158 138.168 280.929 225.84C277.134 235.708 273.339 245.196 270.682 252.787C269.544 253.166 267.646 253.166 266.887 253.166C253.224 253.166 248.291 247.853 248.291 239.124C248.291 234.949 249.429 230.774 251.327 224.701C264.989 185.23 294.212 108.944 296.869 97.5579C294.592 94.5216 292.694 93.383 289.279 93.383C282.827 93.383 273.718 105.528 266.507 117.673L258.538 112.36C272.58 80.8585 286.622 69.852 300.664 69.852C311.67 69.852 320.399 75.545 328.369 90.3468L298.387 164.735L301.044 165.874C337.098 99.4556 367.839 67.1953 390.99 67.1953C408.827 67.1953 417.936 80.8585 417.936 92.624C417.936 99.4556 395.544 151.072 389.472 164.735L392.128 165.874C433.496 89.5877 463.478 67.1953 481.695 67.1953C498.773 67.1953 509.4 79.7199 509.4 93.383C509.4 106.287 475.243 193.58 465.375 223.942C465.755 224.701 466.893 225.46 468.032 225.46C474.863 225.46 494.219 207.243 509.02 189.405Z"/>
<path fill="${COLOR}" d="M275.531 14.4222L261.109 54.2731L206.458 228.858C210.253 232.653 212.531 234.172 220.88 236.449L231.507 239.485L228.091 250.491H132.452L135.868 239.485L146.874 236.828C162.814 233.033 168.127 230.376 174.958 208.363L192.037 153.331C175.717 154.47 157.121 155.229 142.699 155.229C137.006 155.229 127.139 155.229 119.548 154.849C118.03 157.126 116.512 159.024 114.994 160.922C99.0544 181.417 75.9038 214.056 66.4158 231.515C69.8315 234.172 72.8676 235.69 78.5604 236.828L90.3255 239.485L86.9098 250.112L0 255.805L3.41567 244.798C25.4278 236.828 41.3676 223.924 61.8616 200.014C87.6689 169.271 140.042 103.992 171.163 68.6954C219.362 14.0427 239.856 0 251.621 0C262.627 0 270.597 2.27718 275.531 14.4222ZM196.591 140.047L232.645 24.6696C209.494 45.1644 172.681 87.672 130.175 141.945C147.253 140.807 168.127 140.047 196.591 140.047Z"/>
</svg>`;

  // ---- Состояние вьюпорта / размещение лого ---------------------------------
  let WORLD_W = 0, WORLD_H = 0;
  let logoW = 0, logoH = 0, LX = 0, LY = 0, sizeScale = 1;
  let dpr = Math.min(window.devicePixelRatio || 1, 2);

  const OVERFLOW = 1.12;   // >1 => лого шире окна и уходит за края

  function layout(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    WORLD_W = window.innerWidth;
    WORLD_H = window.innerHeight;
    canvas.width  = Math.round(WORLD_W * dpr);
    canvas.height = Math.round(WORLD_H * dpr);

    logoW = WORLD_W * OVERFLOW;          // шире окна
    logoH = logoW * ASPECT;
    LX = (WORLD_W - logoW) / 2;          // <0 => выходит за левый/правый край
    LY = (WORLD_H - logoH) / 2;
    sizeScale = logoW / NAT_W;

    // текст: масштаб contain, по центру
    const s = Math.min(WORLD_W / 1440, WORLD_H / 900);
    stage.style.transform = `translate(-50%,-50%) scale(${s})`;
  }

  // ---- Спрайт частицы -------------------------------------------------------
  const hexToRgb = h => { h=h.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; };
  const sprite = document.createElement("canvas");
  function buildSprite(){
    const SR = Math.max(10, Math.ceil(10 * dpr));
    sprite.width = sprite.height = SR * 2;
    const s = sprite.getContext("2d");
    s.clearRect(0,0,sprite.width,sprite.height);
    const [R,G,B] = hexToRgb(COLOR);
    const g = s.createRadialGradient(SR,SR,0,SR,SR,SR);
    g.addColorStop(0.00, `rgb(${R},${G},${B})`);
    g.addColorStop(0.82, `rgb(${R},${G},${B})`);
    g.addColorStop(1.00, `rgba(${R},${G},${B},0)`);
    s.fillStyle = g; s.beginPath(); s.arc(SR,SR,SR,0,Math.PI*2); s.fill();
  }

  // ---- Частицы --------------------------------------------------------------
  let particles = [];
  const MAX_PARTICLES = 13000;
  const rnd = (a,b) => a + Math.random()*(b-a);

  function sampleParticles(img){
    const SS = 2;
    const off = document.createElement("canvas");
    off.width = NAT_W*SS; off.height = NAT_H*SS;
    const octx = off.getContext("2d");
    const sc = Math.min(NAT_W/681, NAT_H/257);
    const dw = 681*sc, dh = 257*sc;
    octx.drawImage(img, (NAT_W-dw)/2*SS, (NAT_H-dh)/2*SS, dw*SS, dh*SS);
    const data = octx.getImageData(0,0,off.width,off.height).data;

    const step = 2;
    const cand = [];
    for (let y=0; y<NAT_H; y+=step){
      for (let x=0; x<NAT_W; x+=step){
        const a = data[((y*SS)*off.width + (x*SS))*4 + 3];
        if (a > 110){
          cand.push([ (x + rnd(-step*0.6,step*0.6))/NAT_W,    // u (доля 0..1)
                      (y + rnd(-step*0.6,step*0.6))/NAT_H ]);  // v
        }
      }
    }
    for (let i=cand.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=cand[i]; cand[i]=cand[j]; cand[j]=t; }
    const used = cand.slice(0, MAX_PARTICLES);

    particles = used.map(([u,v]) => {
      const t = Math.random();
      const z = (Math.random()+Math.random()-1);
      return {
        u, v,
        x:0, y:0, hx:0, hy:0, vx:0, vy:0,
        z, zf:rnd(0.4,1.2), zph:rnd(0,6.2832),
        size: 0.275 + t*t*1.2,
        alpha: Math.min(0.6 + Math.random()*0.4 + (t>0.85?0.05:0), 1),
        swirl: Math.random()<0.5?1:-1, swirlMag: rnd(0.6,1.5),
        jitter: rnd(0.65,1.4),
        dfreq: rnd(0.5,1.5), dphase: rnd(0,6.2832), dspread: rnd(0.45,0.95),
        phase: rnd(0,6.2832),
        fx: rnd(0.30,1.00), fy: rnd(0.30,1.00), fx2: rnd(0.60,1.70), fy2: rnd(0.60,1.70),
        ph: rnd(0,6.2832), ph2: rnd(0,6.2832),
        bx: rnd(0.18,0.34), by: rnd(0.15,0.30), bph: rnd(0,6.2832)   // невесомый дрейф
      };
    });
    particles.sort((a,b)=>a.z-b.z);
    placeParticles(true);
  }

  function placeParticles(initial){
    for (const p of particles){
      p.hx = LX + p.u*logoW;
      p.hy = LY + p.v*logoH;
      if (initial){ p.x = p.hx; p.y = p.hy; }
    }
  }

  // ---- Указатель (на всё окно) ----------------------------------------------
  const pointer = { x:0, y:0, px:0, py:0, active:false };
  window.addEventListener("pointermove", e => { pointer.x=e.clientX; pointer.y=e.clientY; pointer.active=true; });
  document.addEventListener("mouseleave", () => pointer.active=false);
  window.addEventListener("blur", () => pointer.active=false);

  // ---- Параметры поля -------------------------------------------------------
  const BASE_R   = 330;
  const AURA_AMP = 0.60;
  const FORCE    = 2.0;
  const SWIRL    = 0.55;
  const SPRING   = 0.008;    // мягче -> больше невесомости
  const FRICTION = 0.930;
  const LEAD     = 1.5;
  const MAGNET   = 0.15;
  const MAG_R    = 560;
  const MAXV     = 3.5;
  const IDLE_CHAOS  = 0.020;
  const FOCUS_CHAOS = 0.006;
  const BUOYANCY    = 0.013;  // постоянный невесомый дрейф
  const PARALLAX   = 48;
  const DEPTH_SIZE = 0.55;
  const DA_MIN = 0.34, DA_MAX = 1.0;

  function aura(a,t){
    return Math.sin(a*3 + t*0.9)*0.5 + Math.sin(a*5 - t*1.27 + 1.3)*0.30 + Math.sin(a*2 + t*0.53 + 2.1)*0.20;
  }

  let smVx=0, smVy=0, smSpeed=0, engage=0, lookX=0, lookY=0;

  // ---- Цикл -----------------------------------------------------------------
  let t0 = performance.now();
  function frame(now){
    const t = (now - t0)/1000;
    const SC = sizeScale;

    smVx += ((pointer.x - pointer.px) - smVx)*0.25;
    smVy += ((pointer.y - pointer.py) - smVy)*0.25;
    pointer.px = pointer.x; pointer.py = pointer.y;
    smSpeed += (Math.hypot(smVx,smVy) - smSpeed)*0.2;
    const speedBoost = Math.min(smSpeed/60, 0.30);

    engage += ((pointer.active?1:0) - engage)*0.05;
    const chaos = (FOCUS_CHAOS + (IDLE_CHAOS-FOCUS_CHAOS)*(1-engage)) * SC;

    const fpx = pointer.x + smVx*LEAD;
    const fpy = pointer.y + smVy*LEAD;
    const radial = BASE_R * SC * (1 + speedBoost);
    const magR = MAG_R * SC, parallax = PARALLAX * SC, maxv = MAXV * SC, buoy = BUOYANCY * SC;

    let tlx, tly;
    if (pointer.active){ tlx = (pointer.x - WORLD_W/2)/(WORLD_W/2); tly = (pointer.y - WORLD_H/2)/(WORLD_H/2); }
    else { tlx = Math.sin(t*0.15)*0.5; tly = Math.cos(t*0.12)*0.4; }
    lookX += (tlx - lookX)*0.022; lookY += (tly - lookY)*0.022;

    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.clearRect(0,0,WORLD_W,WORLD_H);

    for (let i=0;i<particles.length;i++){
      const p = particles[i];

      if (pointer.active){
        const dx = p.x - fpx, dy = p.y - fpy;
        const d = Math.hypot(dx,dy) || 0.0001;
        const nx = dx/d, ny = dy/d;
        const ang = Math.atan2(dy,dx);
        const R = radial * (1 + AURA_AMP*aura(ang,t)) * p.jitter;
        if (d < R){
          const u = 1 - d/R, f = u*u*(3-2*u);
          const push = f * FORCE * SC * (0.7 + (p.z+1)*0.35);
          const aj = Math.sin(t*p.dfreq + p.dphase)*p.dspread;
          const ca = Math.cos(aj), sa = Math.sin(aj);
          const rnx = nx*ca - ny*sa, rny = nx*sa + ny*ca;
          p.vx += rnx*push; p.vy += rny*push;
          p.vx += -rny*push*SWIRL*p.swirl*p.swirlMag;
          p.vy +=  rnx*push*SWIRL*p.swirl*p.swirlMag;
        }
        if (d < magR){ const mf = (1 - d/magR)*MAGNET*SC; p.vx -= nx*mf; p.vy -= ny*mf; }
      }

      // возврат домой
      const dxh = p.hx - p.x, dyh = p.hy - p.y;
      p.vx += dxh*SPRING; p.vy += dyh*SPRING;

      // турбулентность для разлетевшихся
      const disp = Math.hypot(dxh,dyh);
      if (disp > 2*SC){
        const k = Math.min(disp/(110*SC), 1);
        p.vx += Math.cos(t*0.5 + p.phase)*0.035*SC*k;
        p.vy += (Math.sin(t*0.7 + p.phase*1.7)*0.035 - 0.02)*SC*k;
      }

      // лёгкое хаотичное «дыхание»
      p.vx += (Math.sin(t*p.fx + p.ph) + Math.sin(t*p.fx2 + p.ph2))*chaos;
      p.vy += (Math.cos(t*p.fy + p.ph) + Math.cos(t*p.fy2 + p.ph2))*chaos;

      // невесомость: постоянный медленный дрейф (плавающие частицы)
      p.vx += Math.sin(t*p.bx + p.bph)*buoy;
      p.vy += Math.cos(t*p.by + p.bph*1.3)*buoy*0.85;

      p.vx *= FRICTION; p.vy *= FRICTION;
      const sp2 = p.vx*p.vx + p.vy*p.vy;
      if (sp2 > maxv*maxv){ const s = maxv/Math.sqrt(sp2); p.vx*=s; p.vy*=s; }
      p.x += p.vx; p.y += p.vy;

      // псевдо-3D проекция
      const zEff = p.z + Math.sin(t*p.zf + p.zph)*0.06;
      const dScale = 1 + zEff*DEPTH_SIZE;
      const dAlpha = DA_MIN + (DA_MAX-DA_MIN)*((zEff+1)*0.5);
      const sx = p.x + zEff*parallax*lookX;
      const sy = p.y + zEff*parallax*lookY;
      const r = p.size * SC * dScale;
      ctx.globalAlpha = Math.min(p.alpha * dAlpha, 1);
      ctx.drawImage(sprite, sx-r, sy-r, r*2, r*2);
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(frame);
  }

  // ---- Resize ---------------------------------------------------------------
  window.addEventListener("resize", () => { layout(); buildSprite(); placeParticles(false); });

  // ---- Старт ----------------------------------------------------------------
  layout(); buildSprite();
  pointer.x = pointer.px = WORLD_W/2; pointer.y = pointer.py = WORLD_H/2;
  const img = new Image();
  img.onload = () => { sampleParticles(img); t0 = performance.now(); requestAnimationFrame(frame); };
  img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(SVG);
})();
</script>
</body>
</html>
